<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
    .brand-logo{
    position:fixed;
    top:25px;
    left:30px;

    text-decoration:none;

    font-size:28px;
    font-weight:700;
    letter-spacing:1px;

    color:#111;

    transition:.3s ease;
}

.brand-logo:hover{
    transform:scale(1.05);
    color:#444;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.login-card{
    width:400px;
    max-width:90%;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    animation:fadeIn .6s ease;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#000;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#333;
}

.error{
    color:red;
    margin-top:10px;
    text-align:center;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>
    <a href="index.html" class="brand-logo">
        L'espresso
    </a>
<div class="login-card">

    <h1>Admin Login</h1>

    <form id="loginForm">

        <div class="input-group">
            <input
                type="text"
                id="username"
                placeholder="Username"
                required>
        </div>

        <div class="input-group">
            <input
                type="password"
                id="password"
                placeholder="Password"
                required>
        </div>

        <button type="submit">
            Login
        </button>

        <div class="error" id="error"></div>

    </form>

</div>

<script>

document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    try{

        const response = await fetch(
            "http://localhost:3000/admin/login",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    username,
                    password
                })
            }
        );

        const data = await response.json();

        if(data.success){

            localStorage.setItem(
                "adminToken",
                data.token
            );

            window.location.href =
                "admin-dashboard.html";

        }else{

            document.getElementById("error")
            .innerText =
                "Invalid username or password";

        }

    }catch(err){

        document.getElementById("error")
        .innerText =
            "Server connection failed";

    }

});

</script>

</body>
</html>
